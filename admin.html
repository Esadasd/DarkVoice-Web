<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Real-Time Admin — StormVoice CZ/SK</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --card-bg: rgba(255, 255, 255, 0.8);
      --border: rgba(0, 0, 0, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.85);
    }

    body.dark {
      --bg: #020617;
      --text: #f1f5f9;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --card-bg: rgba(15, 23, 42, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; min-height: 100vh; }
    h1, h2, h3, .brand-name, .btn-storm { font-family: 'Oxanium', sans-serif; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); border-radius: 8px; }
    .brand-name { font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    .card { background: var(--card-bg); border-radius: 20px; padding: 30px; border: 1px solid var(--border); backdrop-filter: blur(16px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); }

    .group-status-card {
      display: flex; align-items: center; gap: 20px; padding: 20px;
      background: var(--accent-glow); border: 1px solid var(--accent); border-radius: 16px; margin-bottom: 30px;
    }

    .live-indicator { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .btn-storm {
      background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; text-decoration: none;
    }
    .btn-storm:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px var(--accent-glow); }

    .user-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .user-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); font-size: 0.8rem; opacity: 0.6; }
    .user-table td { padding: 15px 12px; border-bottom: 1px solid var(--border); }

    .rank-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; background: var(--border); color: var(--text); }
    .rank-owner { background: #ef4444; color: white; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
    
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 15px; }

    footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/DK.png" alt="SV">
    <div class="brand-name">STORMVOICE ADMIN</div>
  </div>
  <button id="themeToggle" style="background:transparent; border:none; cursor:pointer; color:var(--text); font-size: 1.2rem;">
    <i class="fa-solid fa-moon"></i>
  </button>
</header>

<div class="container">
  <!-- LOGIN -->
  <section id="loginSection" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h2 style="margin-bottom: 20px;">Správce Systému</h2>
    <input type="text" id="userInp" placeholder="Admin jméno">
    <input type="password" id="passInp" placeholder="Heslo">
    <button onclick="login()" class="btn-storm" style="width: 100%;">Přihlásit se</button>
    <p id="error" style="color: #ef4444; margin-top: 10px; font-size: 0.8rem;"></p>
  </section>

  <!-- LIVE PANEL -->
  <section id="adminSection" style="display: none;">
    <div class="group-status-card">
        <i class="fa-brands fa-roblox" style="font-size: 2.5rem; color: #ef4444;"></i>
        <div style="flex-grow: 1;">
            <div style="display: flex; align-items: center;">
                <span class="live-indicator"></span>
                <strong id="gName" style="font-size: 1.2rem;">StormVoice Group</strong>
            </div>
            <div style="font-size: 0.85rem; opacity: 0.8;">
                ID: 537043716 | Členů: <span id="gMembers" style="font-weight: 700;">---</span>
            </div>
        </div>
        <button onclick="syncData()" class="btn-storm" style="background: #444; font-size: 0.75rem;">
            <i class="fa-solid fa-arrows-rotate"></i> Sync Ranks
        </button>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Seznam Týmu</h3>
            <button onclick="openModal()" class="btn-storm"><i class="fa-solid fa-user-plus"></i> Přidat přes ID</button>
        </div>
        
        <table class="user-table">
            <thead>
                <tr>
                    <th>Roblox Avatar</th>
                    <th>Jméno</th>
                    <th>Aktuální Rank</th>
                    <th>Akce</th>
                </tr>
            </thead>
            <tbody id="staffTable"></tbody>
        </table>
    </div>
  </section>
</div>

<!-- MODAL -->
<div id="addModal" class="modal">
    <div class="card" style="width: 100%; max-width: 350px;">
        <h3>Přidat člena</h3>
        <p style="font-size: 0.8rem; margin: 10px 0;">Vložte Roblox ID (např. 1). Rank se načte živě.</p>
        <input type="number" id="newId" placeholder="Roblox ID">
        <div style="display: flex; gap: 10px;">
            <button onclick="addUser()" id="addBtn" class="btn-storm" style="flex: 2;">Přidat do týmu</button>
            <button onclick="closeModal()" class="btn-storm" style="flex: 1; background: #666;">Zrušit</button>
        </div>
    </div>
</div>

<footer>© 2026 StormVoice — Real-Time Group Sync Enabled</footer>

<script>
const GROUP_ID = "537043716";
const API_BASE = "https://groups.roproxy.com/v1"; // RoProxy pro obcházení CORS

let staff = JSON.parse(localStorage.getItem('sv_live_staff')) || [];

// LOGIN
function login() {
    const u = document.getElementById('userInp').value;
    const p = document.getElementById('passInp').value;
    if(u === "DarkSentinelCZ" && p === "stormvoice2026") {
        sessionStorage.setItem('sv_auth', 'true');
        showPanel();
    } else {
        document.getElementById('error').textContent = "Neplatný přístup.";
    }
}

async function showPanel() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    await updateGroupInfo();
    renderStaff();
}

// SYNC GROUP DATA
async function updateGroupInfo() {
    try {
        const res = await fetch(`${API_BASE}/groups/${GROUP_ID}`);
        const data = await res.json();
        document.getElementById('gName').textContent = data.name;
        document.getElementById('gMembers').textContent = data.memberCount.toLocaleString();
    } catch(e) { console.error("API Error", e); }
}

// SYNC RANKS IN REALTIME
async function syncData() {
    const btn = document.querySelector('[onclick="syncData()"]');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Syncing...';
    
    for (let member of staff) {
        try {
            const res = await fetch(`https://groups.roproxy.com/v1/users/${member.robloxId}/groups/roles`);
            const data = await res.json();
            const group = data.data.find(g => g.group.id == GROUP_ID);
            member.rank = group ? group.role.name : "Nečlen";
        } catch(e) { console.warn("Sync failed for", member.username); }
    }
    
    localStorage.setItem('sv_live_staff', JSON.stringify(staff));
    renderStaff();
    btn.innerHTML = '<i class="fa-solid fa-arrows-rotate"></i> Sync Ranks';
}

// RENDER
function renderStaff() {
    const tbody = document.getElementById('staffTable');
    tbody.innerHTML = staff.map(m => `
        <tr>
            <td><img src="https://www.roblox.com/headshot-thumbnail/image?userId=${m.robloxId}&width=150&height=150&format=png" style="width: 40px; border-radius: 8px;"></td>
            <td><strong>${m.username}</strong></td>
            <td><span class="rank-badge ${m.rank.includes('Owner') ? 'rank-owner' : ''}">${m.rank}</span></td>
            <td><button onclick="removeUser(${m.id})" style="color:#ef4444; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-user-minus"></i></button></td>
        </tr>
    `).join('');
}

// ADD USER VIA API
async function addUser() {
    const rId = document.getElementById('newId').value;
    const btn = document.getElementById('addBtn');
    if(!rId) return;

    btn.disabled = true;
    btn.textContent = "Hledám na Robloxu...";

    try {
        const userRes = await fetch(`https://users.roproxy.com/v1/users/${rId}`);
        const userData = await userRes.json();
        
        const rankRes = await fetch(`https://groups.roproxy.com/v1/users/${rId}/groups/roles`);
        const rankData = await rankRes.json();
        const group = rankData.data.find(g => g.group.id == GROUP_ID);
        
        staff.push({
            id: Date.now(),
            username: userData.displayName || userData.name,
            robloxId: rId,
            rank: group ? group.role.name : "Nečlen"
        });

        localStorage.setItem('sv_live_staff', JSON.stringify(staff));
        renderStaff();
        closeModal();
    } catch(e) { alert("Chyba: Uživatel nenalezen."); }
    
    btn.disabled = false;
    btn.textContent = "Přidat do týmu";
}

function removeUser(id) {
    staff = staff.filter(m => m.id !== id);
    localStorage.setItem('sv_live_staff', JSON.stringify(staff));
    renderStaff();
}

function openModal() { document.getElementById('addModal').style.display = 'flex'; }
function closeModal() { document.getElementById('addModal').style.display = 'none'; }

// THEME
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    document.getElementById('themeToggle').innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
};

// AUTO-AUTH
if(sessionStorage.getItem('sv_auth')) showPanel();
</script>
</body>
</html>
