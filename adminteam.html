<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Tým — StormVoice CZ/SK</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --card-bg: rgba(255, 255, 255, 0.7);
      --border: rgba(0, 0, 0, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.85);
    }

    body.dark {
      --bg: #020617;
      --text: #f1f5f9;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --card-bg: rgba(15, 23, 42, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    h1, h2, h3, .brand-name { font-family: 'Oxanium', sans-serif; }

    /* HEADER */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); border-radius: 8px; }
    .brand-name { font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    nav { display: flex; gap: 10px; }
    nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border-radius: 8px; font-weight: 500; }
    nav a:hover { background: var(--border); color: var(--accent); }
    nav a.active { color: var(--accent); background: var(--accent-glow); }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 60px 20px 20px;
    }

    .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .hero p { opacity: 0.7; max-width: 600px; margin: 0 auto; }

    /* CONTROLS */
    .controls {
        max-width: 1200px;
        margin: 20px auto;
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn-view {
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-family: 'Oxanium', sans-serif;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-view:hover { border-color: var(--accent); background: var(--accent-glow); }

    /* ADMIN GRID */
    .admin-container {
      max-width: 1200px;
      margin: 20px auto 80px;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* CARD DESIGN */
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .admin-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .avatar-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      object-fit: cover;
      background: var(--bg);
      border: 2px solid var(--border);
    }

    .status-dot {
        position: absolute;
        bottom: -2px;
        right: -2px;
        width: 16px;
        height: 16px;
        background: #10b981;
        border: 3px solid var(--card-bg);
        border-radius: 50%;
    }

    .admin-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .rank-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--accent-glow);
      color: var(--accent);
      margin-bottom: 8px;
    }

    .profile-link {
        font-size: 0.8rem;
        color: var(--accent);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 5px;
        opacity: 0.8;
    }

    .profile-link:hover { opacity: 1; text-decoration: underline; }

    /* LOADING SPINNER */
    .loader {
        text-align: center;
        padding: 50px;
        font-size: 1.2rem;
        opacity: 0.5;
    }

    footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 0.85rem; border-top: 1px solid var(--border); }

    @media (max-width: 600px) {
        header { flex-direction: column; gap: 15px; }
        .hero h1 { font-size: 1.8rem; }
    }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/DK.png" alt="SV">
    <div>
      <div class="brand-name">STORMVOICE</div>
      <div style="font-size: 10px; letter-spacing: 1px; opacity: 0.7;">CZ/SK KOMUNITA</div>
    </div>
  </div>

  <nav>
    <a href="index.html">Domů</a>
    <a href="adminteam.html" class="active">Tým</a>
    <a href="servers.html">Servery</a>
    <a href="admin.html">Admin</a>
  </nav>

  <button id="themeToggle" style="background:transparent; border:1px solid var(--border); color:var(--text); padding:8px 15px; border-radius:20px; cursor:pointer;">
    <i class="fa-solid fa-moon"></i>
  </button>
</header>

<section class="hero">
    <h1>Náš Admin Tým</h1>
    <p>Lidé, kteří se starají o bezpečnost a plynulý chod StormVoice. Data jsou synchronizována přímo s Roblox skupinou.</p>
</section>

<div class="controls">
    <button class="btn-view" id="toggleView">
        <i class="fa-solid fa-list"></i> Přepnout zobrazení
    </button>
    <button class="btn-view" id="refreshBtn">
        <i class="fa-solid fa-rotate"></i> Aktualizovat
    </button>
</div>

<div class="admin-container">
    <div id="adminList" class="grid">
        <!-- Zde se načtou admini -->
        <div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Načítám data z Robloxu...</div>
    </div>
</div>

<footer>
  <small>© <span id="year"></span> StormVoice CZ/SK — Propojeno s Roblox Group ID: 34526172</small>
</footer>

<script>
/* KONFIGURACE */
const GROUP_ID = "537043716";
// Seznam jmen členů týmu, které chceš zobrazit (aby se nezobrazovala celá groupka, ale jen AT)
const staffUsernames = ["VoidSpecter", "tvojahellokitty", "Mia", "klaudia", "v4nxskq", "Sqm0"];

/* NAČÍTÁNÍ DAT */
async function loadStaff() {
    const container = document.getElementById("adminList");
    container.innerHTML = '<div class="loader"><i class="fa-solid fa-spinner fa-spin"></i> Synchronizuji s Robloxem...</div>';

    try {
        // 1. Získáme ID uživatelů podle jmen
        const userRes = await fetch("https://users.roblox.com/v1/usernames/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usernames: staffUsernames, excludeBannedUsers: true })
        });
        const userData = await userRes.json();
        const userIds = userData.data.map(u => u.id);

        if (userIds.length === 0) throw new Error("Žádní uživatelé nenalezeni");

        // 2. Získáme jejich ranky v Groupce
        // Poznámka: Tato API může vyžadovat proxy na ostrém webu kvůli CORS, pro testování v prohlížeči je to simulováno
        const membersData = {};
        for(let id of userIds) {
            const groupRes = await fetch(`https://groups.roblox.com/v1/users/${id}/groups/roles`);
            const groups = await groupRes.json();
            const svGroup = groups.data.find(g => g.group.id == GROUP_ID);
            membersData[id] = svGroup ? svGroup.role.name : "Člen Týmu";
        }

        // 3. Získáme avatary (Headshots)
        const thumbRes = await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userIds.join(",")}&size=150x150&format=Png&isCircular=false`);
        const thumbData = await thumbRes.json();

        // 4. Renderování
        container.innerHTML = "";
        userData.data.forEach(user => {
            const avatar = thumbData.data.find(t => t.targetId === user.id)?.imageUrl || "assets/DK.png";
            const rank = membersData[user.id];

            const card = document.createElement("div");
            card.className = "admin-card";
            card.innerHTML = `
                <div class="avatar-wrapper">
                    <img src="${avatar}" class="avatar-img" alt="${user.name}">
                    <div class="status-dot"></div>
                </div>
                <div class="admin-info">
                    <span class="rank-badge">${rank}</span>
                    <h3>${user.displayName}</h3>
                    <div style="font-size: 0.75rem; opacity: 0.6; margin-top: -2px;">@${user.name}</div>
                    <a href="https://www.roblox.com/users/${user.id}/profile" target="_blank" class="profile-link">
                        <i class="fa-brands fa-roblox"></i> Profil
                    </a>
                </div>
            `;
            container.appendChild(card);
        });

    } catch (err) {
        container.innerHTML = `<div class="loader" style="color:#ef4444;">Chyba při načítání: ${err.message}<br><small>Zkontrolujte připojení nebo CORS proxy.</small></div>`;
    }
}

/* PŘEPÍNAČ ZOBRAZENÍ */
let isGrid = true;
document.getElementById("toggleView").onclick = () => {
    const list = document.getElementById("adminList");
    isGrid = !isGrid;
    list.className = isGrid ? "grid" : "list";
    document.getElementById("toggleView").innerHTML = isGrid ? 
        '<i class="fa-solid fa-list"></i> Přepnout na seznam' : 
        '<i class="fa-solid fa-grip"></i> Přepnout na mřížku';
};

/* THEME TOGGLE */
const tBtn = document.getElementById('themeToggle');
tBtn.onclick = () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    tBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    localStorage.setItem('sv_theme', isDark ? 'dark' : 'light');
};

/* INIT */
document.getElementById('refreshBtn').onclick = loadStaff;
document.getElementById('year').textContent = new Date().getFullYear();
if(localStorage.getItem('sv_theme') === 'dark') document.body.classList.add('dark');

loadStaff();
</script>

</body>
</html>
