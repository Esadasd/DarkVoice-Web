<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Tým — StormVoice CZ/SK</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --card-bg: rgba(255, 255, 255, 0.7);
      --border: rgba(0, 0, 0, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.85);
    }

    body.dark {
      --bg: #020617;
      --text: #f1f5f9;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --card-bg: rgba(15, 23, 42, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s, border 0.3s; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    h1, h2, h3, .brand-name { font-family: 'Oxanium', sans-serif; }

    /* HEADER */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); border-radius: 8px; }
    .brand-name { font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    nav { display: flex; gap: 10px; }
    nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border-radius: 8px; font-weight: 500; }
    nav a:hover { background: var(--border); color: var(--accent); }
    nav a.active { color: var(--accent); background: var(--accent-glow); }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 { font-size: 2.8rem; margin-bottom: 10px; font-weight: 700; }
    .hero p { opacity: 0.7; max-width: 600px; margin: 0 auto; font-size: 1.1rem; }

    /* CONTROLS */
    .controls {
        max-width: 1200px;
        margin: 0 auto 30px;
        display: flex;
        justify-content: center;
        gap: 15px;
    }

    .btn-view {
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
        font-family: 'Oxanium', sans-serif;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .btn-view:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 15px var(--accent-glow); }

    /* ADMIN GRID */
    .admin-container {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 0 20px;
      min-height: 400px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* CARD DESIGN */
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      backdrop-filter: blur(15px);
      position: relative;
      animation: fadeInUp 0.5s ease backwards;
    }

    .admin-card:hover {
      border-color: var(--accent);
      background: var(--nav-bg);
      box-shadow: 0 15px 35px var(--accent-glow);
    }

    .avatar-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      object-fit: cover;
      background: var(--bg);
      border: 2px solid var(--border);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .status-dot {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        background: #10b981;
        border: 4px solid var(--card-bg);
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

    .admin-info h3 { font-size: 1.25rem; margin-bottom: 2px; font-weight: 700; }
    
    .rank-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 8px;
      background: var(--accent-glow);
      color: var(--accent);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .badge-high { background: #ef4444; color: white; }

    .profile-link {
        font-size: 0.85rem;
        color: var(--text);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        opacity: 0.6;
        font-weight: 500;
    }

    .profile-link:hover { opacity: 1; color: var(--accent); }

    /* LOADER */
    .loader {
        grid-column: 1 / -1;
        text-align: center;
        padding: 100px;
        font-family: 'Oxanium', sans-serif;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.85rem; border-top: 1px solid var(--border); }

    @media (max-width: 700px) {
        header { flex-direction: column; gap: 15px; padding: 20px; }
        .hero h1 { font-size: 2rem; }
        .controls { flex-direction: column; align-items: center; }
    }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/DK.png" alt="SV">
    <div>
      <div class="brand-name">STORMVOICE</div>
      <div style="font-size: 10px; letter-spacing: 1.5px; opacity: 0.7; font-weight: 700;">CZ/SK TEAM</div>
    </div>
  </div>

  <nav>
    <a href="index.html">Domů</a>
    <a href="adminteam.html" class="active">Tým</a>
    <a href="servers.html">Servery</a>
    <a href="admin.html">Admin</a>
  </nav>

  <button id="themeToggle" style="background:transparent; border:1px solid var(--border); color:var(--text); padding:10px 18px; border-radius:20px; cursor:pointer;">
    <i class="fa-solid fa-moon"></i>
  </button>
</header>

<section class="hero">
    <h1>Vedení Projektu</h1>
    <p>Náš tým zajišťuje férové prostředí a neustálý vývoj StormVoice. Ranky jsou synchronizovány s Roblox skupinou v reálném čase.</p>
</section>

<div class="controls">
    <button class="btn-view" id="toggleView">
        <i class="fa-solid fa-grip"></i> Změnit zobrazení
    </button>
    <button class="btn-view" id="refreshBtn">
        <i class="fa-solid fa-arrows-rotate"></i> Aktualizovat data
    </button>
</div>

<div class="admin-container">
    <div id="adminList" class="grid">
        <div class="loader">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: var(--accent); margin-bottom: 15px;"></i>
            <p>Navazuji spojení s Roblox API...</p>
        </div>
    </div>
</div>

<footer>
  <small>© <span id="year"></span> StormVoice CZ/SK — Všechna data jsou čerpána z Group ID: 537043716</small>
</footer>

<script>
/* KONFIGURACE */
const GROUP_ID = "537043716";
// Přidej sem uživatelská jména lidí, kteří mají být na stránce vidět
const staffList = ["DarkSentinelCZ", "JONGLES_GAMESE", "Bobiiikminx"];
const ROXY_USERS = "https://users.roproxy.com/v1";
const ROXY_GROUPS = "https://groups.roproxy.com/v1";

async function loadStaff() {
    const container = document.getElementById("adminList");
    // Necháme loader běžet
    
    try {
        // 1. Získáme ID uživatelů
        const userRes = await fetch(`${ROXY_USERS}/usernames/users`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usernames: staffList, excludeBannedUsers: true })
        });
        const userData = await userRes.json();
        
        container.innerHTML = ""; // Vyčistit loader

        // 2. Pro každého uživatele načteme data v reálném čase
        for (const user of userData.data) {
            try {
                // Zjistit rank v groupce
                const groupRes = await fetch(`${ROXY_GROUPS}/users/${user.id}/groups/roles`);
                const groups = await groupRes.json();
                const svGroup = groups.data.find(g => g.group.id == GROUP_ID);
                const rankName = svGroup ? svGroup.role.name : "Externí Tým";
                
                // Určit styl badge
                const isHigh = rankName.toLowerCase().includes("owner") || rankName.toLowerCase().includes("founder") || rankName.toLowerCase().includes("admin");

                const card = document.createElement("div");
                card.className = "admin-card";
                card.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${user.id}&width=150&height=150&format=png" class="avatar-img" alt="${user.name}">
                        <div class="status-dot"></div>
                    </div>
                    <div class="admin-info">
                        <span class="rank-badge ${isHigh ? 'badge-high' : ''}">${rankName}</span>
                        <h3>${user.displayName}</h3>
                        <div style="font-size: 0.8rem; opacity: 0.5;">@${user.name}</div>
                        <a href="https://www.roblox.com/users/${user.id}/profile" target="_blank" class="profile-link">
                            <i class="fa-brands fa-roblox"></i> Roblox Profil
                        </a>
                    </div>
                `;
                container.appendChild(card);
            } catch (e) { console.error("Chyba u uživatele " + user.name, e); }
        }

    } catch (err) {
        container.innerHTML = `<div class="loader" style="color:#ef4444;">Nepodařilo se spojit s Robloxem. Zkuste to prosím později.</div>`;
    }
}

/* UI LOGIKA */
let isGrid = true;
document.getElementById("toggleView").onclick = () => {
    const list = document.getElementById("adminList");
    isGrid = !isGrid;
    list.className = isGrid ? "grid" : "list";
};

document.getElementById("refreshBtn").onclick = loadStaff;

const tBtn = document.getElementById('themeToggle');
tBtn.onclick = () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    tBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    localStorage.setItem('sv_theme', isDark ? 'dark' : 'light');
};

document.getElementById('year').textContent = new Date().getFullYear();
if(localStorage.getItem('sv_theme') === 'dark') {
    document.body.classList.add('dark');
    tBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
}

// Spustit načítání
loadStaff();
</script>

</body>
</html>
