<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Statistiky — StormVoice CZ/SK</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --card-bg: rgba(255, 255, 255, 0.8);
      --border: rgba(0, 0, 0, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.85);
    }

    body.dark {
      --bg: #020617;
      --text: #f1f5f9;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --card-bg: rgba(15, 23, 42, 0.8);
      --border: rgba(255, 255, 255, 0.1);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, .brand-name { font-family: 'Oxanium', sans-serif; }

    /* HEADER */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); border-radius: 8px; }
    .brand-name { font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    nav { display: flex; gap: 10px; }
    nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border-radius: 8px; font-weight: 500; }
    nav a:hover { background: var(--border); color: var(--accent); }
    nav a.active { color: var(--accent); background: var(--accent-glow); }

    /* MAIN SECTION */
    .container { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
    
    .stats-header { text-align: center; margin-bottom: 40px; }
    .stats-header h2 { font-size: 2.5rem; margin-bottom: 10px; }
    .stats-header p { opacity: 0.7; font-size: 1.1rem; }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 40px 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 15px 30px var(--accent-glow);
    }

    .stat-icon {
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 15px;
      display: block;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 700;
      font-family: 'Oxanium', sans-serif;
      margin-bottom: 5px;
      display: block;
    }

    .stat-label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.6;
      font-weight: 600;
    }

    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #10b981;
      margin-top: 30px;
      padding: 5px 12px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 20px;
    }

    .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.85rem; border-top: 1px solid var(--border); }

    #themeToggle {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      padding: 8px 15px; border-radius: 20px; cursor: pointer;
    }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 15px; }
      .stats-header h2 { font-size: 1.8rem; }
    }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/DK.png" alt="SV">
    <div>
      <div class="brand-name">STORMVOICE</div>
      <div style="font-size: 10px; letter-spacing: 1px; opacity: 0.7;">CZ/SK KOMUNITA</div>
    </div>
  </div>

  <nav>
    <a href="index.html">Domů</a>
    <a href="shop.html">Obchod</a>
    <a href="blog.html">Oznámení</a>
    <a href="stats.html" class="active">Statistiky</a>
    <a href="adminteam.html">Tým</a>
  </nav>

  <button id="themeToggle"><i class="fa-solid fa-moon"></i></button>
</header>

<div class="container">
  <section class="stats-header">
    <h2>Herní Statistiky</h2>
    <p>Sledujte v reálném čase, jak naše komunita roste.</p>
    <div class="live-indicator">
        <div class="dot"></div> LIVE SYNC AKTIVNÍ
    </div>
  </section>

  <div class="stats-grid">
    <!-- ACTIVE PLAYERS -->
    <div class="stat-card">
      <i class="fa-solid fa-users stat-icon"></i>
      <span class="stat-value" id="activePlayers">0</span>
      <span class="stat-label">Aktuálně hraje</span>
    </div>

    <!-- TOTAL VISITS -->
    <div class="stat-card">
      <i class="fa-solid fa-eye stat-icon"></i>
      <span class="stat-value" id="visits">0</span>
      <span class="stat-label">Celkové návštěvy</span>
    </div>

    <!-- FAVORITES -->
    <div class="stat-card">
      <i class="fa-solid fa-star stat-icon"></i>
      <span class="stat-value" id="favorites">0</span>
      <span class="stat-label">Oblíbené</span>
    </div>
  </div>
</div>

<footer>
  <small>© <span id="year"></span> StormVoice CZ/SK — Data poskytuje Roblox API</small>
</footer>

<script>
// Auto year
document.getElementById('year').textContent = new Date().getFullYear();

// THEME SYSTEM
const tBtn = document.getElementById('themeToggle');
const body = document.body;

tBtn.onclick = () => {
    body.classList.toggle('dark');
    const isDark = body.classList.contains('dark');
    tBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
};

if(localStorage.getItem('theme') === 'dark') {
    body.classList.add('dark');
    tBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
}

// Roblox Stats Sync
const gameId = "96059691980081"; // Universe ID

async function updateStats() {
  try {
    // Používáme RoProxy pro obcházení CORS limitů prohlížeče
    const response = await fetch(`https://games.roproxy.com/v1/games?universeIds=${gameId}`);
    const data = await response.json();
    
    if (data.data && data.data[0]) {
        const info = data.data[0];
        animateValue("activePlayers", info.playing);
        animateValue("visits", info.visits);
        animateValue("favorites", info.favoritedCount);
    }
  } catch (error) {
    console.error("Chyba při načítání statistik:", error);
    ["activePlayers", "visits", "favorites"].forEach(id => {
        document.getElementById(id).textContent = "N/A";
    });
  }
}

// Funkce pro plynulé počítání čísel
function animateValue(id, endValue) {
    const obj = document.getElementById(id);
    let startValue = parseInt(obj.textContent.replace(/,/g, '')) || 0;
    let duration = 1500;
    let startTimestamp = null;
    
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const current = Math.floor(progress * (endValue - startValue) + startValue);
        obj.textContent = current.toLocaleString('cs-CZ');
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}

// Spustit hned a pak každou minutu
updateStats();
setInterval(updateStats, 60000);
</script>

</body>
</html>
