<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oznámení — StormVoice CZ/SK</title>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.15);
      --card-bg: rgba(255, 255, 255, 0.7);
      --border: rgba(0, 0, 0, 0.08);
      --nav-bg: rgba(255, 255, 255, 0.85);
      --discord: #5865F2;
    }

    body.dark {
      --bg: #020617;
      --text: #f1f5f9;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.2);
      --card-bg: rgba(15, 23, 42, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --nav-bg: rgba(15, 23, 42, 0.9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    h1, h2, h3, .brand-name { font-family: 'Oxanium', sans-serif; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: var(--nav-bg); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }

    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { height: 45px; filter: drop-shadow(0 0 8px var(--accent)); border-radius: 8px; }
    .brand-name { font-size: 1.3rem; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    nav a { color: var(--text); text-decoration: none; font-size: 0.9rem; padding: 8px 15px; border-radius: 8px; font-weight: 500; }
    nav a.active { color: var(--accent); background: var(--accent-glow); }

    .container {
      max-width: 1200px; margin: 40px auto; padding: 0 20px;
      display: grid; grid-template-columns: 1fr 380px; gap: 30px;
    }

    .main-content .card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px;
      padding: 30px; backdrop-filter: blur(15px); min-height: 400px;
    }

    .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
    .live-dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .announcement-box {
      background: rgba(88, 101, 242, 0.05); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px; position: relative;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .announcement-box::before {
      content: "DISCORD FEED"; position: absolute; top: -10px; right: 20px;
      background: var(--discord); color: white; font-size: 10px; font-weight: 800;
      padding: 2px 8px; border-radius: 4px; font-family: 'Oxanium';
    }

    .discord-widget-container { position: sticky; top: 100px; }
    .widget-info {
        background: var(--discord); color: white; padding: 20px;
        border-radius: 24px 24px 0 0; text-align: center;
    }

    iframe { border-radius: 0 0 24px 24px; border: 1px solid var(--border); background: #2f3136; }

    .btn-join {
        display: block; width: 100%; padding: 15px; background: var(--discord);
        color: white; text-decoration: none; border-radius: 12px;
        text-align: center; font-weight: 700; font-family: 'Oxanium';
        margin-top: 15px; box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2);
    }

    .empty-msg { text-align: center; opacity: 0.5; padding: 50px 0; }

    @media (max-width: 950px) {
      .container { grid-template-columns: 1fr; }
      .discord-widget-container { position: static; }
    }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="assets/DK.png" alt="SV">
    <div class="brand-name">STORMVOICE</div>
  </div>
  <nav>
    <a href="index.html">Domů</a>
    <a href="blog.html" class="active">Oznámení</a>
    <a href="adminteam.html">Tým</a>
    <a href="admin.html">Admin</a>
  </nav>
  <button id="themeToggle" style="background:transparent; border:1px solid var(--border); color:var(--text); padding:8px 15px; border-radius:20px; cursor:pointer;">
    <i class="fa-solid fa-moon"></i>
  </button>
</header>

<div class="container">
  <main class="main-content">
    <div class="card">
      <div class="feed-header">
        <div class="live-dot"></div>
        <h2 style="font-family: 'Oxanium';">Live Oznámení</h2>
        <span style="font-size: 0.7rem; opacity: 0.4; margin-left: auto;" id="syncTime">Sync: aktivní</span>
      </div>

      <!-- SEM SE BUDOU SYPAT ZPRÁVY Z DISCORDU -->
      <div id="announcements">
        <div class="empty-msg">Čekám na zprávy z Discordu...</div>
      </div>
    </div>
  </main>

  <aside class="discord-widget-container">
    <div class="widget-info">
        <i class="fa-brands fa-discord" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
        <h3 style="font-family: 'Oxanium';">StormVoice Discord</h3>
        <p style="font-size: 0.8rem; opacity: 0.9;">Právě online: <span id="onlineCount">--</span></p>
    </div>
    
    <iframe src="https://discord.com/widget?id=1433583582567338060&theme=dark" width="100%" height="450" allowtransparency="true" frameborder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>

    <a href="https://discord.gg/jtjfSgTbGF" target="_blank" class="btn-join">PŘIPOJIT SE K NÁM</a>
  </aside>
</div>

<script>
  // --- LOGIKA PRO NAČÍTÁNÍ ZPRÁV Z WEBHOOKU ---
  async function loadMessages() {
    try {
      // Načte JSON soubor vytvořený PHP skriptem
      const response = await fetch('messages.json?t=' + Date.now());
      const messages = await response.json();
      
      const container = document.getElementById('announcements');
      
      if (messages && messages.length > 0) {
        container.innerHTML = messages.map(m => `
          <div class="announcement-box">
            <div style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 8px;">
              <i class="fa-regular fa-clock"></i> ${m.date} v ${m.time}
            </div>
            <p style="white-space: pre-wrap;">${escapeHtml(m.text)}</p>
          </div>
        `).join('');
        document.getElementById('syncTime').textContent = 'Naposledy aktualizováno: ' + new Date().toLocaleTimeString();
      }
    } catch(e) {
      console.log("Zatím žádné zprávy v messages.json");
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // --- OSTATNÍ FUNKCE ---
  async function updateStatus() {
    try {
        const res = await fetch('https://discord.com/api/guilds/1433583582567338060/widget.json');
        const data = await res.json();
        document.getElementById('onlineCount').textContent = data.presence_count || "Aktivní";
    } catch(e) { document.getElementById('onlineCount').textContent = "Live"; }
  }

  const tBtn = document.getElementById('themeToggle');
  tBtn.onclick = () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    tBtn.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    localStorage.setItem('sv_theme', isDark ? 'dark' : 'light');
  };

  if(localStorage.getItem('sv_theme') === 'dark') {
    document.body.classList.add('dark');
    tBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
  }
  
  // Spustit smyčky
  updateStatus();
  loadMessages();
  setInterval(updateStatus, 30000);
  setInterval(loadMessages, 5000); // Kontrola nových zpráv každých 5 sekund
</script>

</body>
</html>
